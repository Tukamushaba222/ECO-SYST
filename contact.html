<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EcoSyst</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container"> 
            <div class="dropdown">
                <button class="nav-btn">ABOUT US <span class="arrow">▼</span></button>
                <div class="dropdown-content">
                    <a href="about.html#mission">Our Mission</a>
                    <a href="about.html#offerings">What We Offer</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>

            <a href="our-impact.html" class="nav-btn">OUR IMPACT</a>

            <div class="dropdown">
                <button class="nav-btn">COMMUNITY <span class="arrow">▼</span></button>
                <div class="dropdown-content">
                    <a href="index.html">Our Community</a>
                    <a href="#">Join Us</a>
                </div>
            </div>

            <a href="contact.html" class="nav-btn contact-btn">CONTACT US</a>
        </div>
    </nav>

    <main class="contact-container">
        <h2>Get in Touch</h2>
        <p>Have questions about gifting, trading, or our community upcycling events? Drop us a message!</p>
        
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </main>
</body>
</html>
